      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg2)" rx="30"/>

  <!-- Badge -->
  <rect x="230" y="40" width="140" height="36" rx="18" fill="#f59e0b"/>
  <text x="300" y="64" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif" font-weight="bold">🏷️ DEALS</text>

  <!-- Main Icon -->
  <circle cx="300" cy="140" r="50" fill="#d97706" opacity="0.2"/>
  <text x="300" y="155" text-anchor="middle" font-size="50">🏷️</text>

  <!-- Title -->
  <text x="300" y="240" text-anchor="middle" fill="white" font-size="32" font-family="sans-serif" font-weight="bold">Deal Finder Pro</text>
  <text x="300" y="275" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="sans-serif">Amazon Deal Tracker</text>

  <!-- Price -->
  <text x="300" y="340" text-anchor="middle" fill="#22c55e" font-size="48" font-family="sans-serif" font-weight="bold">$9</text>
