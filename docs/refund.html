<h1>退款政策</h1>
<div class="updated">最後更新：2026-07-21</div>
<h2>7 天退款保障</h2>
<p>自購買日起 7 天內，若您對本服務不滿意，可申請全額退款，無需說明理由。</p>
<h2>如何申請</h2>
<p>請透過您購買時使用的付款平台（Ko-fi / Gumroad）發起退款申請，或直接透過 <a href="https://github.com/slashman413/hermes-pay">GitHub</a> 聯絡我們並附上訂單資訊。</p>
<h2>訂閱取消</h2>
<p>月費訂閱可隨時於付款平台帳戶取消，取消後將不再續訂扣款，且於當期結束前仍可繼續使用。已完成之當期費用除符合上述 7 天保障外，恕不另行退款。</p>
<h2>例外</h2>
<p>因濫用、違反服務條款或詐欺情形而終止之帳戶，不適用本退款政策。</p>
